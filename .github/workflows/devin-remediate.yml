name: Devin Remediation Dispatch

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to remediate'
        required: true
      issue_title:
        description: 'Issue title'
        required: true
      issue_body:
        description: 'Issue body content'
        required: true

jobs:
  dispatch-devin:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'devin-remediate'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Resolve issue details
        id: issue
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.issue_number }}" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.inputs.issue_title }}" >> $GITHUB_OUTPUT
            cat >> $GITHUB_OUTPUT << 'BODYEOF'
          body<<EOF
          ${{ github.event.inputs.issue_body }}
          EOF
          BODYEOF
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
            echo "title=${{ github.event.issue.title }}" >> $GITHUB_OUTPUT
            cat >> $GITHUB_OUTPUT << 'BODYEOF'
          body<<EOF
          ${{ github.event.issue.body }}
          EOF
          BODYEOF
          fi

      - name: Check for existing open PR
        id: pr-check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,body \
            --jq "[.[] | select(.body | test(\"(Closes|Fixes|Resolves) #${ISSUE_NUM}\\b\"; \"i\"))] | length")
          echo "open_prs=${EXISTING_PR}" >> $GITHUB_OUTPUT
          if [ "${EXISTING_PR}" -gt 0 ]; then
            echo "::notice::Skipping Devin session — ${EXISTING_PR} open PR(s) already reference issue #${ISSUE_NUM}."
          fi

      - name: Remove devin-remediate label (PR already open)
        if: steps.pr-check.outputs.open_prs != '0' && github.event_name != 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
        run: |
          gh issue edit "${ISSUE_NUM}" \
            --repo "${{ github.repository }}" \
            --remove-label "devin-remediate" || true

      - name: Record duplicate prevented
        if: steps.pr-check.outputs.open_prs != '0' && github.event_name != 'workflow_dispatch'
        run: |
          cat << 'PYEOF' > bump_duplicates.py
          import json
          import os

          METRICS = "metrics.json"
          if os.path.exists(METRICS):
              try:
                  metrics = json.load(open(METRICS))
              except (ValueError, OSError):
                  metrics = {}
          else:
              metrics = {}

          metrics["duplicates_prevented"] = int(metrics.get("duplicates_prevented", 0) or 0) + 1
          json.dump(metrics, open(METRICS, "w"), indent=2)
          print(f"duplicates_prevented = {metrics['duplicates_prevented']}")
          PYEOF
          python3 bump_duplicates.py
          rm -f bump_duplicates.py

          git config user.name "devin-status-bot"
          git config user.email "bot@users.noreply.github.com"
          git add metrics.json
          git diff --staged --quiet || git commit -m "chore: increment duplicates_prevented for issue #${{ steps.issue.outputs.number }} [skip ci]"
          git push

      - name: Create Devin session
        if: steps.pr-check.outputs.open_prs == '0'
        id: devin
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          ISSUE_BODY: ${{ steps.issue.outputs.body }}
        run: |
          SCHEMA='{
            "type": "object",
            "properties": {
              "status": {
                "type": "string",
                "enum": ["in_progress", "blocked", "complete"]
              },
              "files_changed": {
                "type": "array",
                "items": {"type": "string"}
              },
              "pr_url": {"type": "string"},
              "tests_passing": {"type": "boolean"},
              "notes": {"type": "string"}
            },
            "required": ["status"]
          }'

          PROMPT="Remediate GitHub issue #${ISSUE_NUM} in chuangsta/superset: \"${ISSUE_TITLE}\"

          Full issue context:
          ${ISSUE_BODY}

          Instructions:
          - Follow the fix guidance in the issue exactly.
          - If the issue requires a judgment call rather than a mechanical fix,
            make the decision explicitly and document your reasoning in the PR description.
          - Open a pull request referencing Closes #${ISSUE_NUM} in the description.
          - Update structured output as you progress."

          jq -n \
            --arg prompt "$PROMPT" \
            --arg repo "chuangsta/superset" \
            --arg tag "issue-${ISSUE_NUM}" \
            --argjson schema "$SCHEMA" \
            '{
              prompt: $prompt,
              repos: [$repo],
              tags: [$tag, "auto-remediation"],
              structured_output_required: true,
              structured_output_schema: $schema
            }' > payload.json

          RESPONSE=$(curl -s -X POST \
            "https://api.devin.ai/v3/organizations/${DEVIN_ORG_ID}/sessions" \
            -H "Authorization: Bearer ${DEVIN_API_KEY}" \
            -H "Content-Type: application/json" \
            -d @payload.json)

          echo "$RESPONSE"
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.session_id')
          echo "session_id=${SESSION_ID}" >> $GITHUB_OUTPUT
          echo "✅ Devin session created: ${SESSION_ID} for issue #${ISSUE_NUM}"

      - name: Log session to session-log.json
        if: steps.pr-check.outputs.open_prs == '0'
        env:
          ISSUE_NUM: ${{ steps.issue.outputs.number }}
          ISSUE_TITLE: ${{ steps.issue.outputs.title }}
          SESSION_ID: ${{ steps.devin.outputs.session_id }}
        run: |
          pip install jq 2>/dev/null || true

          LOG="session-log.json"
          EXISTING=$(cat "$LOG" 2>/dev/null || echo "[]")

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          NEW_ENTRY=$(jq -n \
            --arg session_id "$SESSION_ID" \
            --arg issue_number "$ISSUE_NUM" \
            --arg issue_title "$ISSUE_TITLE" \
            --arg triggered_at "$TIMESTAMP" \
            '{
              session_id: $session_id,
              issue_number: ($issue_number | tonumber),
              issue_title: $issue_title,
              triggered_at: $triggered_at,
              status: "running",
              pr_url: null,
              acus_consumed: null
            }')

          echo "$EXISTING" | jq --argjson entry "$NEW_ENTRY" '. + [$entry]' > "$LOG"

          echo "Session log updated:"
          cat "$LOG"

      - name: Commit session log
        if: steps.pr-check.outputs.open_prs == '0'
        run: |
          git config user.name "devin-status-bot"
          git config user.email "bot@users.noreply.github.com"
          git add session-log.json
          git diff --staged --quiet || git commit -m "chore: log Devin session for issue #${{ steps.issue.outputs.number }} [skip ci]"
          git push
