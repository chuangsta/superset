name: Devin Status Report

# Refresh the remediation dashboard whenever a PR is merged or closed, so
# status.md / metrics.json reflect merged and abandoned remediation work.
on:
  pull_request:
    types: [closed]

# Grant the permissions the reusable workflow's jobs need (status commit + Pages deploy).
permissions:
  contents: write
  pull-requests: read
  pages: write
  id-token: write

jobs:
  refresh-status:
    uses: ./.github/workflows/devin-status-check.yml
    secrets: inherit
