name: Devin Session Status Check

on:
  workflow_dispatch:         # manual trigger

jobs:
  poll-sessions:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Poll Devin sessions and update status
