name: Devin Session Status Check

on:
  workflow_dispatch:         # manual trigger
  workflow_call:             # reusable: called by devin-status-report.yml

jobs:
  poll-sessions:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Poll Devin sessions and update status
        env:
          DEVIN_API_KEY: ${{ secrets.DEVIN_API_KEY }}
          DEVIN_ORG_ID: ${{ secrets.DEVIN_ORG_ID }}
        run: |
          cat << 'PYEOF' > poll_sessions.py
          import json
          import os
          import datetime
          import requests

          API = "https://api.devin.ai/v3/organizations"
          ORG = os.environ["DEVIN_ORG_ID"]
          KEY = os.environ["DEVIN_API_KEY"]
          HDR = {"Authorization": f"Bearer {KEY}"}
          LOG = "session-log.json"
          OUT_JSON = "status.json"

          # Load existing session log
          if os.path.exists(LOG):
              log = json.load(open(LOG))
          else:
              print("No session-log.json found — nothing to poll yet.")
              log = []

          if not log:
              # Write empty status file so downstream steps don't fail
              json.dump([], open(OUT_JSON, "w"), indent=2)
              exit(0)

          rows = []
          for entry in log:
              sid = entry["session_id"]
              try:
                  r = requests.get(
                      f"{API}/{ORG}/sessions/{sid}",
                      headers=HDR,
                      timeout=10,
                  ).json()
                  prs = r.get("pull_requests") or []
                  pr_url = prs[0].get("pr_url") if prs else None
                  pr_state = prs[0].get("pr_state") if prs else None
                  entry.update({
                      "status": r.get("status_enum"),
                      "pr_url": pr_url,
                      "pr_state": pr_state,
                      "acus_consumed": r.get("acus_consumed"),
                      "structured_output": r.get("structured_output"),
                      "polled_at": datetime.datetime.utcnow().isoformat(),
                  })
              except Exception as e:
                  entry["poll_error"] = str(e)
              rows.append(entry)

          json.dump(rows, open(OUT_JSON, "w"), indent=2)

          print("Polled sessions:")
          for r in rows:
              print(f"  Issue #{r.get('issue_number')} — {r.get('status')} — PR: {r.get('pr_url','none')}")
          PYEOF
          python3 poll_sessions.py

      - name: Compute 7-day metrics and rebuild dashboard
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          cat << 'PYEOF' > compute_metrics.py
          import json
          import os
          import datetime
          import requests

          STATUS_JSON = "status.json"
          METRICS_JSON = "metrics.json"
          OUT_MD = "status.md"
          WINDOW_DAYS = 7
          # A running session older than this is flagged as needing attention.
          STUCK_HOURS = 4

          GH_TOKEN = os.environ.get("GH_TOKEN")
          GH_REPO = os.environ.get("GITHUB_REPOSITORY", "")
          GH_API = "https://api.github.com"
          GH_HDR = {
              "Authorization": f"Bearer {GH_TOKEN}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
          }

          RUNNING = {"running"}
          FINISHED = {"stopped", "finished", "expired", "completed"}

          now = datetime.datetime.utcnow()
          window_start = now - datetime.timedelta(days=WINDOW_DAYS)


          def parse_ts(value):
              if not value:
                  return None
              try:
                  return datetime.datetime.fromisoformat(value.replace("Z", "+00:00")).replace(tzinfo=None)
              except (ValueError, AttributeError):
                  return None


          if os.path.exists(STATUS_JSON):
              rows = json.load(open(STATUS_JSON))
          else:
              rows = []

          # Preserve counters that are maintained by other workflows.
          if os.path.exists(METRICS_JSON):
              try:
                  prev = json.load(open(METRICS_JSON))
              except (ValueError, OSError):
                  prev = {}
          else:
              prev = {}
          duplicates_prevented = int(prev.get("duplicates_prevented", 0) or 0)

          # Restrict to the rolling window.
          window = []
          for r in rows:
              ts = parse_ts(r.get("triggered_at"))
              if ts is not None and ts >= window_start:
                  window.append(r)


          def gh_pr_state(pr_url):
              """Return (state, merged, created_at, merged_at) for a PR URL."""
              if not (pr_url and GH_TOKEN and GH_REPO):
                  return None
              try:
                  # pr_url looks like https://github.com/<owner>/<repo>/pull/<n>
                  number = pr_url.rstrip("/").split("/")[-1]
                  resp = requests.get(
                      f"{GH_API}/repos/{GH_REPO}/pulls/{number}",
                      headers=GH_HDR,
                      timeout=10,
                  )
                  if resp.status_code != 200:
                      return None
                  data = resp.json()
                  return {
                      "state": data.get("state"),
                      "merged": bool(data.get("merged")),
                      "created_at": data.get("created_at"),
                      "merged_at": data.get("merged_at"),
                  }
              except Exception:
                  return None


          # Enrich each windowed session with GitHub PR state.
          for r in window:
              r["_pr"] = gh_pr_state(r.get("pr_url"))

          sessions_started = len(window)
          opened = [r for r in window if r.get("pr_url")]
          prs_opened = len(opened)

          prs_merged = 0
          prs_closed_unmerged = 0
          time_to_pr = []
          for r in opened:
              pr = r.get("_pr") or {}
              if pr.get("merged"):
                  prs_merged += 1
              elif pr.get("state") == "closed":
                  prs_closed_unmerged += 1
              created = parse_ts(pr.get("created_at"))
              triggered = parse_ts(r.get("triggered_at"))
              if created and triggered:
                  time_to_pr.append((created - triggered).total_seconds() / 3600.0)

          def is_blocked(r):
              status = (r.get("status") or "").lower()
              if status == "blocked":
                  return True
              return status in FINISHED and not r.get("pr_url")

          sessions_blocked = sum(1 for r in window if is_blocked(r))
          active_sessions = sum(1 for r in window if (r.get("status") or "").lower() in RUNNING)

          total_acus = 0.0
          for r in window:
              acus = r.get("acus_consumed")
              if isinstance(acus, (int, float)):
                  total_acus += acus

          success_rate = (prs_opened / sessions_started * 100) if sessions_started else 0.0
          merge_rate = (prs_merged / prs_opened * 100) if prs_opened else 0.0
          avg_time_to_pr = (sum(time_to_pr) / len(time_to_pr)) if time_to_pr else None

          metrics = {
              "generated_at": now.strftime("%Y-%m-%dT%H:%M:%SZ"),
              "window_days": WINDOW_DAYS,
              "sessions_started": sessions_started,
              "prs_opened": prs_opened,
              "prs_merged": prs_merged,
              "prs_closed_unmerged": prs_closed_unmerged,
              "sessions_blocked": sessions_blocked,
              "success_rate_pct": round(success_rate, 1),
              "merge_rate_pct": round(merge_rate, 1),
              "avg_time_to_pr_hours": round(avg_time_to_pr, 1) if avg_time_to_pr is not None else None,
              "total_acus_consumed": round(total_acus, 1),
              "duplicates_prevented": duplicates_prevented,
              "active_sessions": active_sessions,
          }
          json.dump(metrics, open(METRICS_JSON, "w"), indent=2)


          def humanize_age(ts):
              if not ts:
                  return "—"
              delta = now - ts
              hours = delta.total_seconds() / 3600.0
              if hours < 1:
                  return f"{int(delta.total_seconds() / 60)}m ago"
              if hours < 48:
                  return f"{int(hours)}h ago"
              return f"{int(hours / 24)}d ago"


          def sid_short(r):
              sid = r.get("session_id", "")
              return (sid[:12] + "…") if sid else "—"


          avg_str = f"{metrics['avg_time_to_pr_hours']}" if metrics["avg_time_to_pr_hours"] is not None else "—"

          with open(OUT_MD, "w") as f:
              f.write("# Devin Remediation Status\n")
              f.write(f"Last updated: {now.strftime('%Y-%m-%d %H:%M UTC')}\n\n")

              f.write(f"## {WINDOW_DAYS}-Day Summary\n")
              f.write("| Metric                        | Value |\n")
              f.write("|-------------------------------|-------|\n")
              f.write(f"| Sessions started              | {metrics['sessions_started']} |\n")
              f.write(f"| PRs opened                    | {metrics['prs_opened']} |\n")
              f.write(f"| PRs merged                    | {metrics['prs_merged']} |\n")
              f.write(f"| PRs closed (unmerged)         | {metrics['prs_closed_unmerged']} |\n")
              f.write(f"| Success rate                  | {metrics['success_rate_pct']}% |\n")
              f.write(f"| Merge rate                    | {metrics['merge_rate_pct']}% |\n")
              f.write(f"| Avg time to PR (hours)        | {avg_str} |\n")
              f.write(f"| Active sessions               | {metrics['active_sessions']} |\n")
              f.write(f"| Sessions blocked              | {metrics['sessions_blocked']} |\n")
              f.write(f"| Duplicates prevented          | {metrics['duplicates_prevented']} |\n")
              f.write(f"| Total ACUs consumed           | {metrics['total_acus_consumed']} |\n\n")

              # Needs Attention: blocked sessions or long-running ones.
              f.write("## Needs Attention\n")
              f.write("| Issue | Session | Status | Reason |\n")
              f.write("|---|---|---|---|\n")
              attention = False
              for r in window:
                  status = (r.get("status") or "unknown").lower()
                  reason = None
                  if is_blocked(r):
                      reason = "Stopped without a PR" if status != "blocked" else "Blocked — needs human"
                  elif status in RUNNING:
                      triggered = parse_ts(r.get("triggered_at"))
                      if triggered and (now - triggered).total_seconds() / 3600.0 > STUCK_HOURS:
                          reason = f"Running >{STUCK_HOURS}h without a PR"
                  if reason:
                      attention = True
                      f.write(f"| #{r.get('issue_number')} | {sid_short(r)} | {status} | {reason} |\n")
              if not attention:
                  f.write("| — | — | — | Nothing needs attention |\n")
              f.write("\n")

              # Recently Completed: merged PRs.
              f.write("## Recently Completed\n")
              f.write("| Issue | PR | Merged | ACUs |\n")
              f.write("|---|---|---|---|\n")
              completed = False
              for r in opened:
                  pr = r.get("_pr") or {}
                  if pr.get("merged"):
                      completed = True
                      acus = r.get("acus_consumed")
                      acus_str = acus if isinstance(acus, (int, float)) else "—"
                      f.write(f"| #{r.get('issue_number')} | {r.get('pr_url')} | yes | {acus_str} |\n")
              if not completed:
                  f.write("| — | — | — | — |\n")
              f.write("\n")

              # In Progress: active sessions.
              f.write("## In Progress\n")
              f.write("| Issue | Session | Started |\n")
              f.write("|---|---|---|\n")
              in_progress = False
              for r in window:
                  if (r.get("status") or "").lower() in RUNNING:
                      in_progress = True
                      f.write(f"| #{r.get('issue_number')} | {sid_short(r)} | {humanize_age(parse_ts(r.get('triggered_at')))} |\n")
              if not in_progress:
                  f.write("| — | — | — |\n")
              f.write("\n")

          # Drop internal helper keys from the persisted status file.
          for r in rows:
              r.pop("_pr", None)
          json.dump(rows, open(STATUS_JSON, "w"), indent=2)

          print("Metrics computed:")
          print(json.dumps(metrics, indent=2))
          PYEOF
          python3 compute_metrics.py

      - name: Commit updated status files
        run: |
          git config user.name "devin-status-bot"
          git config user.email "bot@users.noreply.github.com"
          git add status.json metrics.json status.md session-log.json || true
          git diff --staged --quiet || git commit -m "chore: update Devin remediation status [skip ci]"
          git push
